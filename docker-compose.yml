version: "3.8"
services:

# ── PostgreSQL + Pgvector ──────────────────────────
 postgres:
 image: pgvector/pgvector:pg15
 container_name: rsod-agent-postgres
 restart: unless-stopped
 environment:
 POSTGRES_DB: rsod_agent
 POSTGRES_USER: rsod_admin
 POSTGRES_PASSWORD: rsod_admin
 ports:
 - "5432:5432"
 volumes:
 - postgres_data:/var/lib/postgresql/data
 healthcheck:
 test: ["CMD-SHELL", "pg_isready -U rsod_admin -d rsod_agent"]
 interval: 5s
 timeout: 5s
 retries: 5
 
# ── Redis ──────────────────────────────────────────
 redis:
 image: redis:7-alpine
 container_name: rsod-agent-redis
 restart: unless-stopped
 ports:
 - "6379:6379"
 volumes:
 - redis_data:/data
 healthcheck:
 test: ["CMD", "redis-cli", "ping"]
 interval: 5s
 timeout: 5s
 retries: 5

# ── MinIO 对象存储 ─────────────────────────────────
 minio:
 image: minio/minio:latest
 container_name: rsod-agent-minio
 restart: unless-stopped
 environment:
 MINIO_ROOT_USER: minioadmin
 MINIO_ROOT_PASSWORD: minioadmin
 ports:
 - "9000:9000" # API 端⼝
 - "9001:9001" # Console 端⼝
 volumes:
 - minio_data:/data
3.2.2 环境变量配置
在后端项⽬根⽬录创建 .env.example ⽂件（注意：此⽂件不包含敏感信息，⽤于提交到Git，复制此⽂件重命名
为.env,⽤于开发环境，包含敏感信息，.gitignore 已配置忽略，将不会提交到 Git）：
 command: server /data --console-address ":9001"
 healthcheck:
 test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live"]
 interval: 10s
 timeout: 5s
 retries: 3

